<section class="flex flex-row gap-2 mt-2">
  <country-search-input [placeholder]="'Search by Country'" (searchValue)="countrySearchValue.set($event)"/>
</section>

@if(!countryResource.error() && countryResource.hasValue())
{
  <section class="mt-5">
    <country-list [countryList]="countryResource.value()"/>
  </section>
}
@else {
  {{ countryResource.error() ?? 'Not Found' }}
}
