

<section class="flex flex-row gap-2 mt-2">
  <country-search-input [placeholder]="'Search by Capital'"
      (searchValue)="navigateToQuery($event)"
      [initialValue]="searchValue()"/>
</section>

@if(!countryResource.error() && countryResource.hasValue())
{
  <section class="mt-5">
    <country-list [countryList]="this.countryResource.value()!"/>
  </section>
}
@else{

  <p class="text-3xl text-red-700 font-bold">
    {{ countryResource.error() }}
  </p>

}
